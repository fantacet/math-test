<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>幾何探險 - 豆豆數學</title>
  <style>
    body{font-family:Arial,sans-serif;margin:18px;padding:18px;background:#f0f9ff;color:#0f172a}
    header{display:flex;gap:12px;align-items:center}
    .shape-card{background:white;border-radius:12px;padding:20px;box-shadow:0 8px 22px rgba(2,6,23,0.06);text-align:center}
    svg{width:160px;height:160px}
    .choices{display:flex;gap:10px;justify-content:center;margin-top:12px}
    .choice{padding:8px 12px;border-radius:8px;background:#fff;border:1px solid #ddd;cursor:pointer}
    .progress{margin-top:12px}
    .result-modal{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:opacity .18s}
    .result-modal.show{visibility:visible;opacity:1}
    .modal-card{background:white;padding:18px;border-radius:12px;width:320px;text-align:center}
  .global-ui { position: absolute; top: 18px; right: 18px; display: flex; gap: 10px; align-items: center; z-index: 1000; }
  .mute-btn { background: rgba(255,255,255,0.9); border: none; padding: 8px 10px; border-radius: 12px; font-size: 1.1em; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.12);} 
  .star-counter { background: rgba(255,255,255,0.95); padding: 6px 10px; border-radius: 12px; font-weight: bold; font-size: 1.1em; }
  .encouragement { position: absolute; left: 16px; top: -10px; background: rgba(255,255,255,0.95); padding: 8px 12px; border-radius: 12px; font-size: 1.1em; transform-origin: left top; box-shadow: 0 6px 14px rgba(0,0,0,0.15); pointer-events: none; opacity: 0; transition: transform 0.35s ease, opacity 0.35s ease; }
  .encouragement.show { opacity: 1; transform: translateY(-8px) scale(1); }
  .confetti-container { position: absolute; inset: 0; pointer-events: none; overflow: visible; z-index: 900; }
  .confetti-particle { position: absolute; width: 10px; height: 14px; border-radius: 2px; opacity: 0.95; transform-origin: center; will-change: transform, opacity; }
  .floating-star { position: absolute; font-size: 1.6em; pointer-events: none; animation: floatUp 900ms ease forwards; }
  @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1;} 100% { transform: translateY(-60px) scale(1.2); opacity: 0;} }
  .performance-badge { font-size: 2em; margin-top: 8px; display: inline-block; }
  </style>
  <link rel="stylesheet" href="resource/game-core.css">
</head>
<body>
  <!-- BEGIN quick-wins global UI -->
  <div class="global-ui" aria-hidden="false">
    <button id="muteToggle" class="mute-btn" title="靜音/開聲">🔊</button>
    <div id="starCounter" class="star-counter">⭐ 0</div>
  </div>
  <div style="position: relative;">
    <div id="encouragement" class="encouragement" aria-live="polite"></div>
    <div id="confetti" class="confetti-container"></div>
  </div>
  <header>
    <a href="index.html">← 回到首頁</a>
    <h1>幾何探險</h1>
  </header>
  <p>請看圖並選出正確的形狀或邊數。鍵盤左右移動選項，Enter 確認。</p>

  <div id="game" class="shape-card">
    <div id="svgWrap"></div>
    <div class="choices" id="choices"></div>
    <div class="progress">Q <span id="cur">0</span>/10</div>
  </div>

  <div id="resultModal" class="result-modal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2>結果</h2>
      <p id="resultSummary"></p>
      <div style="margin-top:12px">
        <button id="retryBtn">再一次</button>
        <a href="index.html" style="margin-left:8px"><button>回首頁</button></a>
      </div>
    </div>
  </div>

  <script src="resource/game-core.js"></script>
  <script>
  const Q = getQuickWins();

  const shapes = [
    {name:'正方形', sides:4, svg:`<rect x="20" y="20" width="120" height="120" fill="#60a5fa" />`},
    {name:'長方形', sides:4, svg:`<rect x="10" y="30" width="140" height="100" fill="#7dd3fc" />`},
    {name:'三角形', sides:3, svg:`<polygon points="80,12 24,142 136,142" fill="#f59e0b" />`},
    {name:'五邊形', sides:5, svg:`<polygon points="80,18 118,46 102,96 58,96 42,46" fill="#f472b6" />`},
    {name:'圓形', sides:0, svg:`<circle cx="80" cy="80" r="56" fill="#34d399" />`}
  ];

  const TOTAL = 10;
  let cur = 0; let score = 0; let current = null;

  const svgWrap = document.getElementById('svgWrap');
  const choicesEl = document.getElementById('choices');
  const curEl = document.getElementById('cur');
  const modal = document.getElementById('resultModal');
  const resultSummary = document.getElementById('resultSummary');
  const retryBtn = document.getElementById('retryBtn');

  function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a }

  function nextQ(){
    cur++;
    curEl.textContent = cur;
    // choose a shape randomly
    current = shapes[randInt(0, shapes.length-1)];
    svgWrap.innerHTML = `<svg viewBox="0 0 160 160" role="img" aria-label="圖形">${current.svg}</svg>`;
    // make a choices list: name and number-of-sides style
    const opts = [];
    // correct name
    opts.push({text: current.name, isCorrect:true});
    // wrong name
    const other = shapes.filter(s=>s.name!==current.name);
    // pick two random wrong names
    while (opts.length < 3){ const pick = other[randInt(0, other.length-1)]; if (!opts.find(o=>o.text===pick.name)) opts.push({text:pick.name, isCorrect:false}); }
    // shuffle
    for (let i=opts.length-1;i>0;i--){ const k = Math.floor(Math.random()*(i+1)); [opts[i],opts[k]]=[opts[k],opts[i]] }

    // render choices
    choicesEl.innerHTML = '';
    opts.forEach((o,idx)=>{
      const b = document.createElement('button'); b.className='choice'; b.textContent = `${String.fromCharCode(65+idx)}. ${o.text}`;
      b.dataset.correct = o.isCorrect ? '1' : '0';
      b.addEventListener('click', ()=>{ handleAnswer(o.isCorrect, b); });
      choicesEl.appendChild(b);
    });
    // focus first for keyboard
    setTimeout(()=>{ const f = choicesEl.querySelector('button'); if (f) f.focus(); }, 80);
  }

  function handleAnswer(isCorrect, el){
    if (isCorrect){ score++; el.style.background='#dff7df'; Q.playCorrect(); Q.awardStar(1); Q.encourage(true);
    } else { el.style.background='#ffe6e6'; Q.playWrong(); Q.encourage(false); }
    // brief pause then next or show result
    setTimeout(()=>{ if (cur < TOTAL) nextQ(); else showResult(); }, 800);
  }

  function showResult(){ resultSummary.textContent = `你答對 ${score} / ${TOTAL} 題`; modal.classList.add('show'); if (score >= Math.ceil(TOTAL*0.7)) { Q.confetti(); Q.playLevelUp(); } }

  retryBtn.addEventListener('click', ()=>{ cur = 0; score = 0; modal.classList.remove('show'); nextQ(); });

  // keyboard support: ArrowLeft/Right to change selected button, Enter to submit
  let focusedIndex = 0;
  document.addEventListener('keydown', (e)=>{
    const btns = Array.from(choicesEl.querySelectorAll('button'));
    if (!btns.length) return;
    if (e.key === 'ArrowRight') { focusedIndex = Math.min(btns.length-1, focusedIndex+1); btns[focusedIndex].focus(); }
    else if (e.key === 'ArrowLeft') { focusedIndex = Math.max(0, focusedIndex-1); btns[focusedIndex].focus(); }
    else if (e.key === 'Enter') { const b = document.activeElement; if (b && b.dataset && typeof b.dataset.correct !== 'undefined') { b.click(); } }
  });

  // start
  nextQ();

  </script>
</body>
</html>
