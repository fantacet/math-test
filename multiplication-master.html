<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>乘法表王 - 豆豆數學</title>
  <style>
    body{font-family:Arial,sans-serif;margin:18px;padding:18px;background:#fffbe6;color:#2c3e50}
    header{display:flex;align-items:center;gap:12px}
    a.back{color:#2c3e50;text-decoration:none;font-weight:bold}
    h1{font-size:2.2rem;margin:6px 0}
    .instructions{margin:8px 0 18px;color:#444}
    .controls{margin-bottom:12px}
    .question{font-size:2rem;padding:20px;background:#ffffff;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.06);text-align:center}
    .choices{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
    .choice{padding:12px;background:#f1f7ff;border-radius:10px;border:2px solid transparent;cursor:pointer;text-align:center;font-size:1.25rem}
    .choice:focus{outline:none;border-color:#5b86e5}
    .choice.correct{background:#dff7df;border-color:#38a169}
    .choice.wrong{background:#ffe6e6;border-color:#e53e3e}
    .footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
    .progress{font-weight:bold}
    .result-modal{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:opacity .18s}
    .result-modal.show{visibility:visible;opacity:1}
    .modal-card{background:white;padding:18px;border-radius:12px;width:320px;text-align:center}
    button{cursor:pointer}
    .diff-btn{margin-right:8px;padding:6px 12px;border-radius:8px;border:1px solid #ddd;background:#fff}
  .global-ui { position: absolute; top: 18px; right: 18px; display: flex; gap: 10px; align-items: center; z-index: 1000; }
  .mute-btn { background: rgba(255,255,255,0.9); border: none; padding: 8px 10px; border-radius: 12px; font-size: 1.1em; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.12);} 
  .star-counter { background: rgba(255,255,255,0.95); padding: 6px 10px; border-radius: 12px; font-weight: bold; font-size: 1.1em; }
  .encouragement { position: absolute; left: 16px; top: -10px; background: rgba(255,255,255,0.95); padding: 8px 12px; border-radius: 12px; font-size: 1.1em; transform-origin: left top; box-shadow: 0 6px 14px rgba(0,0,0,0.15); pointer-events: none; opacity: 0; transition: transform 0.35s ease, opacity 0.35s ease; }
  .encouragement.show { opacity: 1; transform: translateY(-8px) scale(1); }
  .confetti-container { position: absolute; inset: 0; pointer-events: none; overflow: visible; z-index: 900; }
  .confetti-particle { position: absolute; width: 10px; height: 14px; border-radius: 2px; opacity: 0.95; transform-origin: center; will-change: transform, opacity; }
  .floating-star { position: absolute; font-size: 1.6em; pointer-events: none; animation: floatUp 900ms ease forwards; }
  @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1;} 100% { transform: translateY(-60px) scale(1.2); opacity: 0;} }
  .performance-badge { font-size: 2em; margin-top: 8px; display: inline-block; }
  </style>
  <link rel="stylesheet" href="resource/game-core.css">
</head>
<body>
  <!-- BEGIN quick-wins global UI -->
  <div class="global-ui" aria-hidden="false">
    <button id="muteToggle" class="mute-btn" title="靜音/開聲">🔊</button>
    <div id="starCounter" class="star-counter">⭐ 0</div>
  </div>
  <div style="position: relative;">
    <div id="encouragement" class="encouragement" aria-live="polite"></div>
    <div id="confetti" class="confetti-container"></div>
  </div>
  <header>
    <a href="index.html" class="back">← 回到首頁</a>
    <h1>乘法表王</h1>
  </header>
  <p class="instructions">選擇難度後開始。每回合 10 題，答對可獲得星星 ⭐ 。使用鍵盤 1-4 選擇答案，Enter 提交。</p>

  <div class="controls">
    <button class="diff-btn" data-diff="easy">簡單</button>
    <button class="diff-btn" data-diff="medium">中等</button>
    <button class="diff-btn" data-diff="hard">困難</button>
    <button id="startBtn" style="float:right;padding:6px 12px;border-radius:8px;background:#5b86e5;color:white;border:none">Start</button>
  </div>

  <div id="playArea">
    <div id="questionWrap">
      <div id="question" class="question">按 Start 開始遊戲</div>
      <div id="choices" class="choices" role="list"></div>
    </div>
    <div class="footer">
      <div class="progress">Q <span id="cur">0</span>/10</div>
      <div id="feedback" aria-live="polite"></div>
    </div>
  </div>

  <div id="resultModal" class="result-modal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 id="resultTitle">成績</h2>
      <p id="resultSummary"></p>
      <div style="margin-top:12px">
        <button id="retryBtn">再一次</button>
        <a href="index.html" style="margin-left:8px"><button>回首頁</button></a>
      </div>
    </div>
  </div>

  <script src="resource/game-core.js"></script>
  <script>
  const Q = getQuickWins();

  // Game state
  const TOTAL = 10;
  let questions = [];
  let curIndex = 0;
  let score = 0;
  let difficulty = 'easy';

  // DOM
  const startBtn = document.getElementById('startBtn');
  const choicesEl = document.getElementById('choices');
  const questionEl = document.getElementById('question');
  const curEl = document.getElementById('cur');
  const feedback = document.getElementById('feedback');
  const modal = document.getElementById('resultModal');
  const resultSummary = document.getElementById('resultSummary');
  const retryBtn = document.getElementById('retryBtn');

  // Difficulty buttons
  document.querySelectorAll('.diff-btn').forEach(b=> b.addEventListener('click', ()=>{
    document.querySelectorAll('.diff-btn').forEach(x=>x.style.boxShadow='');
    b.style.boxShadow='inset 0 0 0 2px #5b86e5';
    difficulty = b.dataset.diff;
  }));

  function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a }

  function makeQuestions(){
    questions = [];
    for (let i=0;i<TOTAL;i++){
      let a,b;
      if (difficulty==='easy') { a = randInt(1,5); b = randInt(1,5); }
      else if (difficulty==='medium') { a = randInt(2,9); b = randInt(2,9); }
      else { a = randInt(3,12); b = randInt(2,12); }
      const correct = a*b;
      // make three distractors
      const choices = new Set([correct]);
      while (choices.size < 4) {
        // plausible distractors
        const delta = randInt(-6,6);
        choices.add(Math.max(0, correct + delta));
      }
      const arr = Array.from(choices);
      // shuffle
      for (let j=arr.length-1;j>0;j--){ const k = Math.floor(Math.random()*(j+1)); [arr[j],arr[k]] = [arr[k],arr[j]] }
      questions.push({a,b,correct,choices:arr});
    }
  }

  function renderQuestion(){
    const q = questions[curIndex];
    questionEl.textContent = `${q.a} × ${q.b} = ?`;
    choicesEl.innerHTML = '';
    q.choices.forEach((c,i)=>{
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.setAttribute('data-index', i);
      btn.setAttribute('data-value', c);
      btn.textContent = `${i+1}. ${c}`;
      btn.addEventListener('click', ()=> handleAnswer(c, btn));
      btn.tabIndex = 0;
      choicesEl.appendChild(btn);
    });
    curEl.textContent = curIndex+1;
    feedback.textContent = '';
  }

  function handleAnswer(val, btnEl){
    const q = questions[curIndex];
    const correct = q.correct;
    // disable further clicks
    Array.from(choicesEl.children).forEach(b=>b.disabled = true);
    if (val === correct){
      btnEl.classList.add('correct');
      score++;
      Q.playCorrect();
      Q.awardStar(1);
      Q.encourage(true);
      feedback.textContent = '答對了！';
    } else {
      btnEl.classList.add('wrong');
      Q.playWrong();
      Q.encourage(false);
      feedback.textContent = `答錯，正確答案：${correct}`;
      // highlight correct choice
      Array.from(choicesEl.children).forEach(b=>{ if (parseInt(b.dataset.value,10) === correct) b.classList.add('correct') });
    }

    // next question after short delay
    setTimeout(()=>{
      curIndex++;
      if (curIndex < TOTAL) renderQuestion(); else showResult();
    }, 900);
  }

  function showResult(){
    resultSummary.textContent = `你答對 ${score} / ${TOTAL} 題`;
    modal.classList.add('show');
    // celebration if good
    if (score >= Math.ceil(TOTAL*0.7)){
      Q.confetti(); Q.playLevelUp();
    }
  }

  function startGame(){
    curIndex = 0; score = 0;
    makeQuestions();
    renderQuestion();
    modal.classList.remove('show');
    // focus first choice for keyboard
    setTimeout(()=> { const c = document.querySelector('.choice'); if (c) c.focus(); }, 120);
  }

  // keyboard support (1-4, Enter)
  document.addEventListener('keydown', function(e){
    if (modal.classList.contains('show')) return;
    if (!/^[1-4]$/.test(e.key) && e.key !== 'Enter') return;
    if (/^[1-4]$/.test(e.key)){
      const idx = parseInt(e.key,10)-1;
      const btn = choicesEl.children[idx];
      if (btn) btn.click();
    }
  });

  startBtn.addEventListener('click', function(){ Q.playClick(); startGame(); });
  retryBtn.addEventListener('click', function(){ Q.playClick(); startGame(); modal.classList.remove('show'); });

  </script>
</body>
</html>
